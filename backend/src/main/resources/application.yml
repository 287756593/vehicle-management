server:
  port: ${SERVER_PORT:18231}

spring:
  application:
    name: vehicle-management
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/vehicle_management?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:vehicle_app}
    password: ${DB_PASSWORD:change-me}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  sql:
    init:
      mode: never

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: ${JWT_SECRET:change-this-jwt-secret-to-a-long-random-value}
  expiration: ${JWT_EXPIRATION:1296000000}  # 15 days
  header: ${JWT_HEADER:Authorization}
  prefix: ${JWT_PREFIX:Bearer}

logging:
  level:
    com.company.vehicle: debug
